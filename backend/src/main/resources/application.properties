spring.application.name=getmytix

#  Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#DB variables development
# DB_PORT(5432), DB_NAME(gmt), DB_HOST(localhost), DB_USERNAME, DB_PASSWORD

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#  Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#  CORS (allow Vite dev server)
app.cors.allowed-origins=http://localhost:5173,https://getmytix-phi.vercel.app/

#  Scheduler
# How many seats the bot randomly books every tick (0=disable)
app.scheduler.bot-seats-per-tick=2

#  Server
server.port=8080
